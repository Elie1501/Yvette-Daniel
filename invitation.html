<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitation - Yvette & Daniel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,500&family=Montserrat:wght@400;700;800&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --bleu-principal: #1a3a63;
            --blanc-pure: #ffffff;
            --beige-fond: #fdfcf7;
            --transition-reveal: all 1.2s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Cormorant Garamond', serif; background-color: var(--beige-fond); color: #333; overflow-x: hidden; }

        /* --- HERO SECTION --- */
        .hero-parallax {
            height: 100vh; width: 100%; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .parallax-bg {
            position: absolute; top: -15%; left: 0; width: 100%; height: 140%;
            background: url('bisous.jpg') no-repeat center center;
            background-size: cover; z-index: -1; will-change: transform;
        }

        .hero-parallax::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.4)); z-index: 0;
        }

        .hero-content { position: relative; z-index: 2; text-align: center; color: white; padding: 0 25px; will-change: transform, opacity; }
        .hero-content h1 { font-family: 'Pinyon Script', cursive; font-size: clamp(3rem, 13vw, 7rem); white-space: nowrap; line-height: 1.1; margin-bottom: 30px; text-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* --- COUNTDOWN --- */
        .countdown { display: flex; gap: 10px; justify-content: center; }
        .count-box { background: rgba(255, 255, 255, 0.95); padding: 15px 10px; border-radius: 15px; min-width: 68px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); backdrop-filter: blur(10px); }
        .count-num { font-family: 'Montserrat'; font-weight: 800; font-size: 1.2rem; color: var(--bleu-principal); display: block; }
        .count-label { font-size: 0.55rem; text-transform: uppercase; color: #888; letter-spacing: 1.5px; }

        /* --- REVEAL --- */
        .reveal { opacity: 0; transform: translateY(50px); transition: var(--transition-reveal); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- SECTIONS --- */
        .section { padding: 80px 20px; text-align: center; position: relative; z-index: 10; background: var(--blanc-pure); }
        .section.alt { background: var(--beige-fond); }
        .card-img { width: 100%; max-width: 550px; margin: 0 auto 40px; display: block; border-radius: 2px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        h2 { font-family: 'Pinyon Script', cursive; font-size: 3.5rem; color: var(--bleu-principal); margin-bottom: 15px; }
        .details { font-size: 1.4rem; margin-bottom: 35px; line-height: 1.5; }
        .btn-waze { display: inline-block; padding: 14px 35px; border: 1px solid var(--bleu-principal); color: var(--bleu-principal); text-decoration: none; font-family: 'Montserrat'; font-weight: 700; font-size: 0.7rem; letter-spacing: 2px; transition: 0.4s; }
        .btn-waze:hover { background: var(--bleu-principal); color: white; transform: translateY(-3px); }

        /* --- RSVP FORM MODIFIÉ --- */
        .rsvp-section { padding: 40px 20px 100px; } /* Moins d'espace en haut, plus en bas */
        .rsvp-card { max-width: 600px; margin: 0 auto; padding: 40px 25px; background: white; border-radius: 8px; box-shadow: 0 30px 60px rgba(0,0,0,0.05); }

        /* Ajustement spécifique pour le titre "Confirmation" */
        .rsvp-section h2 { margin-top: 0; margin-bottom: 50px; } /* Espace réduit en haut, augmenté en bas */

        .form-group { margin-bottom: 25px; text-align: left; }
        .rsvp-column { background: #f9f9f9; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee; }
        label { font-family: 'Montserrat'; font-weight: 700; font-size: 0.65rem; letter-spacing: 1px; color: var(--bleu-principal); text-transform: uppercase; display: block; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #ddd; background: transparent; font-size: 1.1rem; outline: none; font-family: inherit; }
        .submit-btn { width: 100%; padding: 20px; background: var(--bleu-principal); color: white; border: none; font-family: 'Montserrat'; font-weight: 700; letter-spacing: 2px; cursor: pointer; margin-top: 20px; }

        .guest-details { max-height: 0; overflow: hidden; transition: 0.4s ease-out; opacity: 0; }
        .guest-details.show { max-height: 300px; opacity: 1; margin-top: 15px; }

        .arrow-scroll { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); animation: bounce 2s infinite; cursor: pointer; z-index: 5; }
        @keyframes bounce { 0%,20%,50%,80%,100%{transform:translateY(0) translateX(-50%)} 40%{transform:translateY(10px) translateX(-50%)} 60%{transform:translateY(5px) translateX(-50%)} }
    </style>
</head>
<body>

<header class="hero-parallax">
    <div class="parallax-bg" id="bg"></div>
    <div class="hero-content" id="hero">
        <h1>Yvette & Daniel</h1>
        <div class="countdown">
            <div class="count-box"><span class="count-num" id="d">00</span><span class="count-label">Jours</span></div>
            <div class="count-box"><span class="count-num" id="h">00</span><span class="count-label">Hrs</span></div>
            <div class="count-box"><span class="count-num" id="m">00</span><span class="count-label">Min</span></div>
            <div class="count-box"><span class="count-num" id="s">00</span><span class="count-label">Sec</span></div>
        </div>
    </div>
    <div class="arrow-scroll" onclick="document.querySelector('#next').scrollIntoView()">
        <svg width="35" height="35" viewBox="0 0 24 24" fill="white"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
    </div>
</header>

<div id="next" class="section reveal">
    <img src="ceremonieCivile.jpg" alt="Mairie" class="card-img">
    <h2>Cérémonie Civile</h2>
    <p class="details">Mairie du 19e arrondissement<br>Dimanche 21 Juin 2026 à 14h00</p>
    <a href="https://waze.com" class="btn-waze">PLAN WAZE</a>
</div>

<div class="section alt reveal">
    <img src="houppa.jpg" alt="Houppa" class="card-img">
    <h2>La Houppa</h2>
    <p class="details">InterContinental Paris - Le Grand<br>À partir de 17h30</p>
    <a href="https://waze.com" class="btn-waze">PLAN WAZE</a>
</div>

<section class="section rsvp-section reveal">
    <div class="rsvp-card">
        <h2>Confirmation</h2>
        <form id="rsvpForm">
            <div class="form-group">
                <label>NOM & PRÉNOM</label>
                <input type="text" placeholder="Ex: Famille Levy" required>
            </div>

            <div class="rsvp-column">
                <label>CÉRÉMONIE CIVILE (MAIRIE)</label>
                <select onchange="toggleGuest(this, 'm_det')">
                    <option value="non">Absent</option>
                    <option value="oui">Présent</option>
                </select>
                <div id="m_det" class="guest-details">
                    <label style="margin-top:15px">Nombre d'adultes</label>
                    <input type="number" value="1" min="1">
                    <label style="margin-top:10px">Nombre d'enfants</label>
                    <input type="number" value="0" min="0">
                </div>
            </div>

            <div class="rsvp-column">
                <label>HOUPPA & SOIRÉE</label>
                <select onchange="toggleGuest(this, 'h_det')">
                    <option value="non">Absent</option>
                    <option value="oui">Présent</option>
                </select>
                <div id="h_det" class="guest-details">
                    <label style="margin-top:15px">Nombre d'adultes</label>
                    <input type="number" value="1" min="1">
                    <label style="margin-top:10px">Nombre d'enfants</label>
                    <input type="number" value="0" min="0">
                </div>
            </div>

            <div class="form-group">
                <label>UN PETIT MOT ?</label>
                <textarea rows="2" placeholder="Votre message..."></textarea>
            </div>

            <button type="submit" class="submit-btn">ENVOYER LA RÉPONSE</button>
        </form>
    </div>
</section>

<script>
    window.addEventListener('scroll', () => {
        const s = window.pageYOffset;
        const bg = document.getElementById('bg');
        const hero = document.getElementById('hero');
        if (bg) bg.style.transform = `translateY(${s * 0.45}px)`;
        if (hero) {
            hero.style.transform = `translateY(${s * -0.15}px)`;
            hero.style.opacity = 1 - (s / 700);
        }

        document.querySelectorAll('.reveal').forEach(el => {
            if(el.getBoundingClientRect().top < window.innerHeight * 0.85) el.classList.add('active');
        });
    });

    const target = new Date("2026-06-21T14:00:00").getTime();
    setInterval(() => {
        const diff = target - new Date().getTime();
        if (diff > 0) {
            document.getElementById("d").innerText = String(Math.floor(diff / 864e5)).padStart(2,'0');
            document.getElementById("h").innerText = String(Math.floor((diff % 864e5) / 36e5)).padStart(2,'0');
            document.getElementById("m").innerText = String(Math.floor((diff % 36e5) / 6e4)).padStart(2,'0');
            document.getElementById("s").innerText = String(Math.floor((diff % 6e4) / 1e3)).padStart(2,'0');
        }
    }, 1000);

    function toggleGuest(select, id) {
        const detail = document.getElementById(id);
        if(select.value === 'oui') detail.classList.add('show');
        else detail.classList.remove('show');
    }
</script>

</body>
</html>
